services:
  ollama:
    image: ollama/ollama:latest
    container_name: rusichi-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  bot:
    build: .
    container_name: rusichi-bot
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
